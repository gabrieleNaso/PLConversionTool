services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend.dev
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USERNAME:-dev}
    image: plconversiontool-backend:dev
    environment:
      TZ: ${TZ:-UTC}
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      PYTHONHASHSEED: "0"
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-8000}
    working_dir: /workspace/backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./:/workspace:delegated
      - ./output:/workspace/output
      - ./tmp:/workspace/tmp
      - ./.docker/cache:/home/${USERNAME:-dev}/.cache
    command: ["bash", "-lc", "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    init: true

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend.dev
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USERNAME:-dev}
    image: plconversiontool-frontend:dev
    environment:
      TZ: ${TZ:-UTC}
      NODE_ENV: development
      BACKEND_INTERNAL_URL: "http://backend:8000"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:${BACKEND_PORT:-8000}"
    depends_on:
      backend:
        condition: service_healthy
    working_dir: /workspace/frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./:/workspace:delegated
      - ./.docker/cache:/home/${USERNAME:-dev}/.cache
      - frontend_node_modules:/workspace/frontend/node_modules
    command: ["bash", "-lc", "npm install --no-fund --no-audit && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    init: true

volumes:
  frontend_node_modules:
